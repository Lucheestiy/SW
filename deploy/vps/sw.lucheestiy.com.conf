# VPS nginx config for sw.lucheestiy.com.
# Reverse tunnel target:
#   VPS 127.0.0.1:18095 -> local 127.0.0.1:8095
#
server {
    listen 80;
    listen [::]:80;
    server_name sw.lucheestiy.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sw.lucheestiy.com;

    ssl_certificate /etc/letsencrypt/live/sw.lucheestiy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sw.lucheestiy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:18095;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
