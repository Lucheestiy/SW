# VPS nginx config for hvac.lucheestiy.com.
# Reverse tunnel target:
#   VPS 127.0.0.1:18094 -> local 127.0.0.1:8094
#
# Initial state is HTTP only. Once DNS resolves to 104.236.97.60,
# run:
#   certbot --nginx -d hvac.lucheestiy.com --non-interactive --agree-tos -m admin@lucheestiy.com --redirect

server {
    listen 80;
    listen [::]:80;
    server_name hvac.lucheestiy.com;

    location / {
        proxy_pass http://127.0.0.1:18094;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
